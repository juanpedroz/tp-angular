<div class="card">
  <div class="card-header">
    🛒 Carrito
  </div>

  <ul class="list-group list-group-flush">
    <li class="list-group-item d-flex justify-content-between" *ngFor="let item of (listaCarrito$ | async)">
      <div *ngIf="item.cantidad > 0">
        {{item.codigo}} x{{item.cantidad}}
      </div>
    </li>
  </ul>

  <div class="card-footer">
    <!-- Total: ${{total}} -->
  </div>
</div>
