<div class="card">
  <div class="card-header bg-dark text-white">
    <div class="d-flex justify-content-between align-items-center">
      <span class="fw-semibold">🛒 Carrito</span>
      <span class="badge text-bg-light text-dark">En proceso</span>
    </div>
  </div>

  <ul class="list-group list-group-flush">
    <li class="list-group-item" *ngFor="let item of (listaCarrito$ | async)">
      <div *ngIf="item.cantidad > 0" class="d-flex justify-content-between align-items-center">
        <span>{{ item.codigo }}</span>
        <span class="badge text-bg-primary">x{{ item.cantidad }}</span>
      </div>
    </li>
    <li class="list-group-item text-muted text-center py-4" *ngIf="!(listaCarrito$ | async)?.some(item => item.cantidad > 0)">
      Tu carrito está vacío.
    </li>
  </ul>

  <div class="card-footer text-muted small">
    Revisa tus productos antes de confirmar la compra.
  </div>
</div>
