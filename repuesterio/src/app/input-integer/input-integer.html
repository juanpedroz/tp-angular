<div class="input-group input-group-sm">
  <button class="btn btn-outline-danger btn-sm" (click)="restarCantidad()">-</button>
  <input
    type="number"
    name="cantidad"
    [(ngModel)]="cantidad"
    [value]="cantidad"
    (ngModelChange)="cantidadChange.emit($event)"
    placeholder="0"
    min="0"
    [max]="max"
    class="form-control form-control-sm text-center"
  />
  <button class="btn btn-outline-success btn-sm" (click)="sumarCantidad()">+</button>
</div>
