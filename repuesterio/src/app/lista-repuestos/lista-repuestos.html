<table class="table">
  <thead>
    <tr>
      <th scope="col">Código</th>
      <th scope="col">Descripción</th>
      <th scope="col">Imagen</th>
      <th scope="col">Precio</th>
      <th scope="col">Stock</th>
    </tr>
  </thead>
  <tbody>
    @for (repuesto of repuestos; track repuesto.codigo) {
      <tr [ngClass]="{ promo: repuesto.promo }">
        <th scope="row">{{ repuesto.codigo }}</th>
        <td>{{ repuesto.descripcion }}</td>
        <td>
          <img [src]="repuesto.imagen" class="img-fluid" [alt]="repuesto.codigo" />
        </td>
        <td>{{ repuesto.precio }}</td>
        <td>
          @if (repuesto.stock > 0) {
            <span class="badge text-bg-success">Con stock</span>
          } @else {
            <span class="badge text-bg-danger">Sin stock</span>
          }
        </td>
      </tr>
    } @empty {
      <tr>
        <td colspan="5" class="text-center text-muted">No hay elementos</td>
      </tr>
    }
  </tbody>
</table>
