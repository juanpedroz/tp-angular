<div class="card">
  <div class="card-header">
    Promociones
  </div>

  <ul class="list-group list-group-flush">
    @for (repuesto of repuestos; track repuesto.codigo) {
      <!-- @if (repuesto.promo) { -->
        <li class="list-group-item">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <h5>{{ repuesto.descripcion }}</h5>
              <p class="mb-0">Código: {{ repuesto.codigo }}</p>
              <p class="mb-0">Precio: {{ repuesto.precio }}</p>
            </div>
            <img width="100" [src]="repuesto.imagen" [alt]="repuesto.codigo" />
          </div>
        </li>
      <!-- } -->
    } @empty {
      <li class="list-group-item text-center text-muted">
        No hay promociones
      </li>
    }
  </ul>
</div>
