<div class="card">
  <div class="card-header">
    💳 Resumen
  </div>

  <div class="card-body">
    <ng-container *ngIf="(total$ | async) as total">
      <p *ngIf="total > 0" class="mb-2">Total: ${{ total | number: '1.2-2' }}</p>
      <p *ngIf="total === 0" class="text-muted mb-3">El carrito está vacío.</p>
    </ng-container>
    <hr>

    <button class="btn btn-success w-100" [disabled]="(total$ | async) === 0">
      Finalizar compra
    </button>
  </div>
</div>
